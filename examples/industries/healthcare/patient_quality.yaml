test:
  name: healthcare_patient_data_quality
  type: data_quality
  source:
    type: file
    path: examples/industries/healthcare/patient_data.csv
    format: csv
  rules:
    - not_null:
        column: patient_id
    - unique:
        column: patient_id
    - regex:
        column: patient_id
        pattern: '^P\d{3}$'
    - range:
        column: age
        min: 0
        max: 120
    - regex:
        column: blood_type
        pattern: '^(A|B|AB|O)[+-]$'
    - regex:
        column: diagnosis_date
        pattern: '^\d{4}-\d{2}-\d{2}$'
    - not_null:
        column: medication
