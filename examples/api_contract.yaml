test:
  name: orders_api_contract
  type: api_contract
  source:
    type: rest
    url: http://127.0.0.1:8000/orders
    method: GET
    headers:
      Accept: application/json
  rules:
    - schema:
        file: examples/order_schema.json
    - response_code:
        value: 200
    - field_present:
        field: orders
